<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E40AF"/>
      <stop offset="60%" style="stop-color:#2563EB"/>
      <stop offset="100%" style="stop-color:#3B82F6"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#F0F7FF;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Left side: branding -->
  <g transform="translate(80, 0)">
    <!-- Icon -->
    <g transform="translate(0, 180)">
      <!-- Document icon -->
      <rect x="0" y="0" width="56" height="68" rx="6" fill="white" opacity="0.95"/>
      <path d="M 40 0 L 56 16 L 40 16 Z" fill="#BFDBFE"/>
      <rect x="10" y="24" width="36" height="4" rx="2" fill="#2563EB"/>
      <rect x="10" y="34" width="28" height="4" rx="2" fill="#93C5FD"/>
      <rect x="10" y="44" width="32" height="4" rx="2" fill="#93C5FD"/>
      <rect x="10" y="54" width="20" height="4" rx="2" fill="#93C5FD"/>
      <!-- Green checkmark circle -->
      <circle cx="44" cy="56" r="12" fill="#22C55E"/>
      <path d="M 38 56 L 42 60 L 50 52" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- Brand name -->
    <text x="0" y="310" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="64" font-weight="800" fill="white" letter-spacing="-2">Curriculei</text>

    <!-- Tagline -->
    <text x="0" y="368" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="26" font-weight="400" fill="rgba(255,255,255,0.85)">Gerador de Currículo Profissional</text>

    <!-- Badges -->
    <g transform="translate(0, 400)">
      <rect x="0" y="0" width="148" height="38" rx="19" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
      <text x="74" y="25" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="600" fill="white" text-anchor="middle">✓ Gratuito</text>

      <rect x="164" y="0" width="178" height="38" rx="19" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
      <text x="253" y="25" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="600" fill="white" text-anchor="middle">✓ Sem Cadastro</text>

      <rect x="358" y="0" width="190" height="38" rx="19" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
      <text x="453" y="25" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="600" fill="white" text-anchor="middle">✓ Download em PDF</text>
    </g>
  </g>

  <!-- Right side: resume card mockup -->
  <g transform="translate(680, 60)">
    <rect x="0" y="0" width="440" height="510" rx="16" fill="url(#card)" filter="drop-shadow(0 20px 60px rgba(0,0,0,0.25))"/>

    <!-- Card header -->
    <rect x="0" y="0" width="440" height="110" rx="16" fill="#2563EB"/>
    <rect x="0" y="94" width="440" height="16" fill="#2563EB"/>

    <!-- Name placeholder -->
    <rect x="28" y="24" width="200" height="18" rx="4" fill="rgba(255,255,255,0.9)"/>
    <!-- Job title placeholder -->
    <rect x="28" y="50" width="150" height="12" rx="3" fill="rgba(255,255,255,0.6)"/>
    <!-- Contact info placeholders -->
    <rect x="28" y="76" width="80" height="10" rx="3" fill="rgba(255,255,255,0.5)"/>
    <rect x="120" y="76" width="80" height="10" rx="3" fill="rgba(255,255,255,0.5)"/>
    <rect x="212" y="76" width="80" height="10" rx="3" fill="rgba(255,255,255,0.5)"/>

    <!-- Section: Resumo -->
    <rect x="28" y="130" width="100" height="8" rx="2" fill="#2563EB" opacity="0.8"/>
    <rect x="28" y="148" width="384" height="7" rx="2" fill="#D1D5DB"/>
    <rect x="28" y="161" width="320" height="7" rx="2" fill="#D1D5DB"/>

    <!-- Section: Experiência -->
    <rect x="28" y="190" width="140" height="8" rx="2" fill="#2563EB" opacity="0.8"/>
    <rect x="28" y="210" width="180" height="8" rx="2" fill="#374151" opacity="0.7"/>
    <rect x="28" y="224" width="120" height="7" rx="2" fill="#9CA3AF"/>
    <rect x="28" y="238" width="360" height="6" rx="2" fill="#D1D5DB"/>
    <rect x="28" y="250" width="300" height="6" rx="2" fill="#D1D5DB"/>

    <rect x="28" y="272" width="160" height="8" rx="2" fill="#374151" opacity="0.7"/>
    <rect x="28" y="286" width="110" height="7" rx="2" fill="#9CA3AF"/>
    <rect x="28" y="300" width="340" height="6" rx="2" fill="#D1D5DB"/>

    <!-- Section: Habilidades -->
    <rect x="28" y="330" width="100" height="8" rx="2" fill="#2563EB" opacity="0.8"/>
    <rect x="28" y="350" width="68" height="24" rx="12" fill="#DBEAFE"/>
    <rect x="104" y="350" width="58" height="24" rx="12" fill="#DBEAFE"/>
    <rect x="170" y="350" width="76" height="24" rx="12" fill="#DBEAFE"/>
    <rect x="254" y="350" width="64" height="24" rx="12" fill="#DBEAFE"/>

    <!-- Section: Idiomas -->
    <rect x="28" y="396" width="70" height="8" rx="2" fill="#2563EB" opacity="0.8"/>
    <rect x="28" y="416" width="80" height="8" rx="2" fill="#374151" opacity="0.7"/>
    <rect x="28" y="430" width="60" height="7" rx="2" fill="#9CA3AF"/>
    <rect x="130" y="416" width="70" height="8" rx="2" fill="#374151" opacity="0.7"/>
    <rect x="130" y="430" width="55" height="7" rx="2" fill="#9CA3AF"/>

    <!-- Template color dots at bottom -->
    <circle cx="186" cy="482" r="10" fill="#2563EB"/>
    <circle cx="212" cy="482" r="10" fill="#1F2937"/>
    <circle cx="238" cy="482" r="10" fill="#7C3AED"/>
    <text x="264" y="488" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#9CA3AF">3 templates</text>
  </g>

  <!-- Domain at bottom -->
  <text x="600" y="600" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" font-weight="500" fill="rgba(255,255,255,0.6)" text-anchor="middle">curriculei.com.br</text>
</svg>
